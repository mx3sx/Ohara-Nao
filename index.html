<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おはらの自己紹介</title>
  <style>
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", sans-serif;
      background: linear-gradient(to bottom, #ffe6f0, #ffffff);
      color: #333;
      text-align: center;
    }

    header {
      background-color: rgba(255, 182, 193, 0.6);
      padding: 30px 0;
    }

    h1 {
      margin: 0;
      font-size: 2.5em;
    }

    .sakura {
      position: fixed;
      top: -10px;
      width: 10px;
      height: 10px;
      background: pink;
      border-radius: 50%;
      opacity: 0.7;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
      }
    }

    section {
      padding: 40px 20px;
    }

    .card {
      background: white;
      margin: 20px auto;
      padding: 20px;
      max-width: 500px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      background-color: rgba(255, 182, 193, 0.5);
    }
  </style>
</head>
<body>

  <header>
    <h1>おはらの自己紹介</h1>
    <p>桜のようにやさしく、楽しく 🌸</p>
  </header>

  <section>
    <div class="card">
      <h2>名前</h2>
      <p>おはら</p>
    </div>

    <div class="card">
      <h2>好きなこと</h2>
      <p>（ここに好きなことを書いてください）</p>
    </div>

    <div class="card">
      <h2>一言</h2>
      <p>（メッセージを書いてください）</p>
    </div>
  </section>

  <footer>
    <p>© 2026 Ohara</p>
  </footer>

  <script>
    function createSakura() {
      const sakura = document.createElement('div');
      sakura.classList.add('sakura');
      sakura.style.left = Math.random() * window.innerWidth + 'px';
      sakura.style.animationDuration = (Math.random() * 3 + 2) + 's';
      document.body.appendChild(sakura);

      setTimeout(() => {
        sakura.remove();
      }, 5000);
    }

    setInterval(createSakura, 300);
  </script>

</body>
</html>
